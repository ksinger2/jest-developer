<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jest Game Design Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d0d0f;
            --bg-secondary: #151519;
            --bg-tertiary: #1c1c22;
            --bg-elevated: #232329;
            --border-color: #2a2a32;
            --text-primary: #e8e8ed;
            --text-secondary: #9898a0;
            --text-muted: #666670;
            --accent-primary: #7c3aed;
            --accent-hover: #8b5cf6;
            --accent-glow: rgba(124, 58, 237, 0.3);
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            height: 56px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-primary), #a855f7);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .project-name {
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .project-name:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-color);
        }

        .project-name.editing {
            background: var(--bg-primary);
            border-color: var(--accent-primary);
            outline: none;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-elevated);
            border-color: var(--text-muted);
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        /* Screen Tabs */
        .screen-tabs {
            display: flex;
            align-items: center;
            padding: 0 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            height: 44px;
            gap: 4px;
            overflow-x: auto;
        }

        .screen-tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            border-radius: 6px 6px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            position: relative;
        }

        .screen-tab:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .screen-tab.active {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .screen-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent-primary);
        }

        .screen-tab-name {
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .screen-tab-close {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.2s;
        }

        .screen-tab:hover .screen-tab-close {
            opacity: 1;
        }

        .screen-tab-close:hover {
            background: var(--danger);
            color: white;
        }

        .add-screen-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px dashed var(--border-color);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .add-screen-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: rgba(124, 58, 237, 0.1);
        }

        /* Main Layout */
        .main-container {
            display: flex;
            height: calc(100vh - 100px);
        }

        /* Left Panel */
        .left-panel {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            flex-shrink: 0;
        }

        .panel-section {
            border-bottom: 1px solid var(--border-color);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            cursor: pointer;
            user-select: none;
        }

        .section-header:hover {
            background: var(--bg-tertiary);
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .section-toggle {
            color: var(--text-muted);
            transition: transform 0.2s;
        }

        .section-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .section-content {
            padding: 0 16px 16px;
        }

        .section-content.collapsed {
            display: none;
        }

        /* Color Rows */
        .color-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
        }

        .color-label {
            flex: 1;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .color-picker-wrapper {
            position: relative;
            width: 32px;
            height: 32px;
        }

        .color-picker {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
        }

        .color-preview {
            position: absolute;
            inset: 0;
            border-radius: 6px;
            border: 2px solid var(--border-color);
            pointer-events: none;
        }

        .color-delete {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .color-delete:hover {
            background: var(--danger);
            color: white;
        }

        /* Prompt Window */
        .prompt-window {
            margin-top: 12px;
            padding: 12px;
            background: var(--bg-primary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .prompt-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .prompt-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            resize: none;
            min-height: 60px;
        }

        .prompt-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .prompt-submit {
            margin-top: 8px;
            width: 100%;
            padding: 8px;
            background: linear-gradient(135deg, var(--accent-primary), #a855f7);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .prompt-submit:hover {
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-1px);
        }

        /* Component Add Buttons */
        .add-component-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .add-component-btn {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .add-component-btn:hover {
            background: var(--bg-elevated);
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }

        /* Shape Picker */
        .shape-picker {
            display: none;
            padding: 12px;
            background: var(--bg-primary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
        }

        .shape-picker.visible {
            display: block;
        }

        .shape-picker-title {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .shape-options {
            display: flex;
            gap: 10px;
        }

        .shape-option {
            width: 50px;
            height: 50px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .shape-option:hover {
            border-color: var(--accent-primary);
            background: rgba(124, 58, 237, 0.1);
        }

        .shape-option svg {
            width: 24px;
            height: 24px;
            fill: var(--text-secondary);
        }

        /* Component Card */
        .component-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .component-card.selected {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .component-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .component-name {
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid transparent;
        }

        .component-name:hover {
            background: var(--bg-tertiary);
        }

        .component-name.editing {
            background: var(--bg-secondary);
            border-color: var(--accent-primary);
            outline: none;
        }

        .component-type {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .component-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-label {
            font-size: 11px;
            color: var(--text-muted);
            width: 50px;
            flex-shrink: 0;
        }

        .control-input {
            flex: 1;
            padding: 6px 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 12px;
        }

        .control-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .control-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            cursor: pointer;
        }

        .control-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent-primary);
            border-radius: 50%;
            cursor: pointer;
        }

        .control-value {
            width: 40px;
            text-align: right;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .upload-btn {
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .upload-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .trigger-input {
            width: 100%;
            padding: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 11px;
            resize: none;
            min-height: 40px;
        }

        .trigger-input::placeholder {
            color: var(--text-muted);
        }

        .delete-component-btn {
            width: 100%;
            padding: 6px;
            background: transparent;
            border: 1px solid var(--danger);
            border-radius: 4px;
            color: var(--danger);
            font-size: 11px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .delete-component-btn:hover {
            background: var(--danger);
            color: white;
        }

        /* Preview Panel */
        .preview-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            background-image:
                radial-gradient(circle at 1px 1px, var(--border-color) 1px, transparent 0);
            background-size: 20px 20px;
            overflow: hidden;
        }

        .phone-frame {
            width: 390px;
            height: 600px;
            background: var(--bg-secondary);
            border-radius: 24px;
            border: 3px solid var(--bg-elevated);
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 28px;
            background: var(--bg-elevated);
            border-radius: 0 0 16px 16px;
            z-index: 100;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .preview-element {
            position: absolute;
            cursor: move;
            user-select: none;
        }

        .preview-element.selected {
            outline: 2px solid var(--accent-primary);
            outline-offset: 2px;
        }

        .preview-element .resize-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--accent-primary);
            border: 2px solid white;
            border-radius: 2px;
            display: none;
        }

        .preview-element.selected .resize-handle {
            display: block;
        }

        .resize-handle.nw { top: -5px; left: -5px; cursor: nw-resize; }
        .resize-handle.ne { top: -5px; right: -5px; cursor: ne-resize; }
        .resize-handle.sw { bottom: -5px; left: -5px; cursor: sw-resize; }
        .resize-handle.se { bottom: -5px; right: -5px; cursor: se-resize; }

        .preview-button {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 500;
            color: white;
        }

        .preview-text {
            color: white;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .preview-counter {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .preview-gameboard {
            display: grid;
            gap: 2px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }

        .gameboard-cell {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .preview-ui-element {
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Right Panel */
        .right-panel {
            width: 280px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
            flex-shrink: 0;
        }

        .properties-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .properties-title {
            font-size: 14px;
            font-weight: 600;
        }

        .properties-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .properties-content {
            padding: 16px;
        }

        .property-group {
            margin-bottom: 16px;
        }

        .property-group-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .property-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .property-label {
            font-size: 12px;
            color: var(--text-secondary);
            width: 40px;
        }

        .property-input {
            flex: 1;
            padding: 6px 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 12px;
        }

        .property-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .no-selection {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .no-selection-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        /* Asset Library */
        .asset-library {
            padding: 12px;
            background: var(--bg-primary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-top: 12px;
        }

        .asset-library-title {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .asset-item {
            aspect-ratio: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
        }

        .asset-item:hover {
            border-color: var(--accent-primary);
        }

        .asset-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 24px;
            min-width: 400px;
            max-width: 600px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Export Preview */
        .export-preview {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            max-height: 300px;
            overflow: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-elevated);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--success);
            background: rgba(34, 197, 94, 0.1);
        }

        .toast.error {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">JG</div>
            <span class="project-name" id="projectName" contenteditable="false">Untitled Game</span>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="saveProject()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17,21 17,13 7,13 7,21"/>
                    <polyline points="7,3 7,8 15,8"/>
                </svg>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        // ==========================================
        // State Management
        // ==========================================
        let state = {
            projectName: 'Untitled Game',
            screens: [],
            currentScreenId: null,
            selectedElementId: null,
            assets: [],
            colors: [
                { id: 'bg', label: 'Background', value: '#1a1a2e' },
                { id: 'accent', label: 'Accent', value: '#7c3aed' },
                { id: 'button', label: 'Buttons', value: '#4f46e5' },
                { id: 'text', label: 'Text', value: '#ffffff' },
                { id: 'secondary', label: 'Secondary', value: '#6b7280' }
            ],
            nextId: 1
        };

        // ==========================================
        // Utility Functions
        // ==========================================
        function generateId() {
            return `elem_${state.nextId++}`;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast visible ${type}`;
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        function toggleSection(header) {
            const toggle = header.querySelector('.section-toggle');
            const content = header.nextElementSibling;
            toggle.classList.toggle('collapsed');
            content.classList.toggle('collapsed');
        }

        // ==========================================
        // Project Name
        // ==========================================
        const projectNameEl = document.getElementById('projectName');

        projectNameEl.addEventListener('dblclick', () => {
            projectNameEl.contentEditable = 'true';
            projectNameEl.classList.add('editing');
            projectNameEl.focus();
            document.execCommand('selectAll', false, null);
        });

        projectNameEl.addEventListener('blur', () => {
            projectNameEl.contentEditable = 'false';
            projectNameEl.classList.remove('editing');
            state.projectName = projectNameEl.textContent.trim() || 'Untitled Game';
            projectNameEl.textContent = state.projectName;
        });

        projectNameEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                projectNameEl.blur();
            }
        });

        // ==========================================
        // Screen Management
        // ==========================================
        function addScreen() {
            const screenId = generateId();
            const screenNumber = state.screens.length + 1;
            const screen = {
                id: screenId,
                name: `Screen ${screenNumber}`,
                elements: [],
                backgroundColor: state.colors.find(c => c.id === 'bg')?.value || '#1a1a2e'
            };
            state.screens.push(screen);
            renderScreenTabs();
            switchToScreen(screenId);
            showToast(`Screen ${screenNumber} created`);
        }

        function deleteScreen(screenId, e) {
            e.stopPropagation();
            if (state.screens.length <= 1) {
                showToast('Cannot delete the last screen', 'error');
                return;
            }
            const idx = state.screens.findIndex(s => s.id === screenId);
            state.screens = state.screens.filter(s => s.id !== screenId);
            if (state.currentScreenId === screenId) {
                const newIdx = Math.min(idx, state.screens.length - 1);
                switchToScreen(state.screens[newIdx].id);
            }
            renderScreenTabs();
            showToast('Screen deleted');
        }

        function switchToScreen(screenId) {
            state.currentScreenId = screenId;
            state.selectedElementId = null;
            renderScreenTabs();
            renderPreview();
            renderProperties();
            renderComponentLists();
        }

        function renameScreen(screenId, newName) {
            const screen = state.screens.find(s => s.id === screenId);
            if (screen) {
                screen.name = newName;
                renderScreenTabs();
            }
        }

        function renderScreenTabs() {
            const tabsContainer = document.getElementById('screenTabs');
            tabsContainer.innerHTML = '';

            state.screens.forEach(screen => {
                const tab = document.createElement('button');
                tab.className = `screen-tab ${screen.id === state.currentScreenId ? 'active' : ''}`;
                tab.innerHTML = `
                    <span class="screen-tab-name" ondblclick="event.stopPropagation(); makeScreenEditable('${screen.id}', this)">${screen.name}</span>
                    <span class="screen-tab-close" onclick="deleteScreen('${screen.id}', event)">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </span>
                `;
                tab.onclick = () => switchToScreen(screen.id);
                tabsContainer.appendChild(tab);
            });

            const addBtn = document.createElement('button');
            addBtn.className = 'add-screen-btn';
            addBtn.innerHTML = `
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Add Screen
            `;
            addBtn.onclick = addScreen;
            tabsContainer.appendChild(addBtn);
        }

        function makeScreenEditable(screenId, element) {
            element.contentEditable = 'true';
            element.focus();
            document.execCommand('selectAll', false, null);

            element.onblur = () => {
                element.contentEditable = 'false';
                renameScreen(screenId, element.textContent.trim() || 'Untitled Screen');
            };

            element.onkeydown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    element.blur();
                }
            };
        }

        // ==========================================
        // Color Management
        // ==========================================
        function renderColors() {
            const container = document.getElementById('colorRows');
            container.innerHTML = '';

            state.colors.forEach(color => {
                const row = document.createElement('div');
                row.className = 'color-row';
                row.innerHTML = `
                    <span class="color-label">${color.label}</span>
                    <div class="color-picker-wrapper">
                        <input type="color" class="color-picker" value="${color.value}"
                            onchange="updateColor('${color.id}', this.value)">
                        <div class="color-preview" style="background: ${color.value}"></div>
                    </div>
                    <button class="color-delete" onclick="deleteColor('${color.id}')" title="Delete">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                `;
                container.appendChild(row);
            });
        }

        function updateColor(id, value) {
            const color = state.colors.find(c => c.id === id);
            if (color) {
                color.value = value;
                renderColors();
                renderPreview();
            }
        }

        function deleteColor(id) {
            const defaultColors = ['bg', 'accent', 'button', 'text', 'secondary'];
            if (defaultColors.includes(id)) {
                showToast('Cannot delete default colors', 'error');
                return;
            }
            state.colors = state.colors.filter(c => c.id !== id);
            renderColors();
            showToast('Color removed');
        }

        function processColorPrompt() {
            const promptInput = document.getElementById('colorPrompt');
            const prompt = promptInput.value.trim();

            if (!prompt) {
                showToast('Please enter a prompt', 'error');
                return;
            }

            // Parse the prompt to extract color name
            let colorName = prompt;

            // Try to extract meaningful name from prompt
            const patterns = [
                /add (?:a |an )?(.+?) (?:color|control)/i,
                /(?:color|control) for (.+)/i,
                /(.+?) color/i,
                /add (.+)/i
            ];

            for (const pattern of patterns) {
                const match = prompt.match(pattern);
                if (match) {
                    colorName = match[1].trim();
                    break;
                }
            }

            // Clean up and format the name
            colorName = colorName
                .replace(/(?:color|control|and|a|an|the)/gi, '')
                .trim()
                .split(' ')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
                .join(' ');

            if (!colorName) {
                colorName = 'Custom Color';
            }

            // Generate a unique ID
            const colorId = 'custom_' + colorName.toLowerCase().replace(/\s+/g, '_') + '_' + Date.now();

            // Generate a random color
            const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');

            state.colors.push({
                id: colorId,
                label: colorName,
                value: randomColor
            });

            renderColors();
            promptInput.value = '';
            showToast(`Added "${colorName}" color control`);
        }

        // ==========================================
        // Shape Picker
        // ==========================================
        function showShapePicker(type) {
            const pickerId = type === 'button' ? 'buttonShapePicker' : 'uiShapePicker';
            const picker = document.getElementById(pickerId);
            picker.classList.toggle('visible');
        }

        function hideShapePickers() {
            document.getElementById('buttonShapePicker').classList.remove('visible');
            document.getElementById('uiShapePicker').classList.remove('visible');
        }

        // ==========================================
        // Component Creation
        // ==========================================
        function getCurrentScreen() {
            return state.screens.find(s => s.id === state.currentScreenId);
        }

        function addButton(shape) {
            hideShapePickers();
            const screen = getCurrentScreen();
            if (!screen) return;

            const id = generateId();
            const element = {
                id,
                type: 'button',
                name: `Button ${screen.elements.filter(e => e.type === 'button').length + 1}`,
                shape,
                x: 145,
                y: 250,
                width: shape === 'rectangle' ? 100 : 60,
                height: shape === 'oval' ? 40 : 60,
                color: state.colors.find(c => c.id === 'button')?.value || '#4f46e5',
                text: 'Button',
                textColor: '#ffffff',
                triggerBehavior: '',
                image: null
            };

            screen.elements.push(element);
            state.selectedElementId = id;
            renderComponentLists();
            renderPreview();
            renderProperties();
            showToast('Button added');
        }

        function addUIElement(shape) {
            hideShapePickers();
            const screen = getCurrentScreen();
            if (!screen) return;

            const id = generateId();
            const element = {
                id,
                type: 'ui',
                name: `UI Element ${screen.elements.filter(e => e.type === 'ui').length + 1}`,
                shape,
                x: 145,
                y: 250,
                width: shape === 'rectangle' ? 100 : 60,
                height: shape === 'oval' ? 40 : 60,
                color: state.colors.find(c => c.id === 'secondary')?.value || '#6b7280',
                image: null
            };

            screen.elements.push(element);
            state.selectedElementId = id;
            renderComponentLists();
            renderPreview();
            renderProperties();
            showToast('UI element added');
        }

        function addText() {
            const screen = getCurrentScreen();
            if (!screen) return;

            const id = generateId();
            const element = {
                id,
                type: 'text',
                name: `Text ${screen.elements.filter(e => e.type === 'text').length + 1}`,
                x: 145,
                y: 250,
                width: 100,
                height: 30,
                content: 'Sample Text',
                fontSize: 16,
                fontFamily: 'sans-serif',
                color: state.colors.find(c => c.id === 'text')?.value || '#ffffff',
                customFont: null
            };

            screen.elements.push(element);
            state.selectedElementId = id;
            renderComponentLists();
            renderPreview();
            renderProperties();
            showToast('Text element added');
        }

        function addCounter() {
            const screen = getCurrentScreen();
            if (!screen) return;

            const id = generateId();
            const element = {
                id,
                type: 'counter',
                name: `Counter ${screen.elements.filter(e => e.type === 'counter').length + 1}`,
                x: 145,
                y: 250,
                width: 80,
                height: 40,
                initialValue: 0,
                displayFormat: '{value}',
                behavior: 'Score counter - increases on match',
                fontSize: 24,
                color: state.colors.find(c => c.id === 'accent')?.value || '#7c3aed',
                textColor: '#ffffff'
            };

            screen.elements.push(element);
            state.selectedElementId = id;
            renderComponentLists();
            renderPreview();
            renderProperties();
            showToast('Counter added');
        }

        function addGameBoard() {
            const screen = getCurrentScreen();
            if (!screen) return;

            // Only allow one game board per screen
            if (screen.elements.some(e => e.type === 'gameboard')) {
                showToast('Only one game board per screen allowed', 'error');
                return;
            }

            const id = generateId();
            const element = {
                id,
                type: 'gameboard',
                name: 'Game Board',
                x: 45,
                y: 150,
                width: 300,
                height: 300,
                rows: 8,
                columns: 8,
                cellSize: 36,
                mechanics: 'Match-3 puzzle gameplay with swipe to swap gems',

        // ==========================================

        function renderComponentLists() {

            renderComponentList('textComponents', 'text');
            renderComponentList('counterComponents', 'counter');

            elements.forEach(element => {
                const card = createComponentCard(element);
                container.appendChild(card);

            if (element.type === 'gameboard') {
                controlsHTML += `
                    <div class="control-row">
                        <span class="control-label">Rows</span>

                            onchange="updateElement('${element.id}', 'rows', parseInt(this.value))">

                    <div class="control-row">
                        <span class="control-label">Cols</span>

                        <span class="control-value">${element.cellSize}px</span>

                    <div class="control-row" style="flex-direction:column;align-items:stretch;gap:4px">

        function makeNameEditable(id, element) {
            element.contentEditable = 'true';
            element.classList.add('editing');
            element.focus();
            document.execCommand('selectAll', false, null);

            element.onblur = () => {
                element.contentEditable = 'false';
                element.classList.remove('editing');
                updateElement(id, 'name', element.textContent.trim() || 'Unnamed');
            };

            element.onkeydown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    element.blur();
                }
            };
        }

        // ==========================================
        // Element Operations
        // ==========================================
        function updateElement(id, property, value) {
            const screen = getCurrentScreen();
            if (!screen) return;

            const element = screen.elements.find(e => e.id === id);
            if (element) {
                element[property] = value;
                renderPreview();
                renderProperties();

                // Only re-render component list if name changed
                if (property === 'name') {
                    renderComponentLists();
                }
            }
        }

        function deleteElement(id) {
            const screen = getCurrentScreen();
            if (!screen) return;

            screen.elements = screen.elements.filter(e => e.id !== id);
            if (state.selectedElementId === id) {
                state.selectedElementId = null;
            }
            renderComponentLists();
            renderPreview();
            renderProperties();
            showToast('Element deleted');
        }

        function selectElement(id) {
            state.selectedElementId = id;
            renderComponentLists();
            renderPreview();
            renderProperties();
        }

        function uploadElementImage(id, event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                updateElement(id, 'image', e.target.result);
                renderComponentLists();
                showToast('Image uploaded');
            };
            reader.readAsDataURL(file);
        }

        function uploadFont(id, event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const fontName = 'customFont_' + id;
                const fontFace = new FontFace(fontName, `url(${e.target.result})`);
                fontFace.load().then((loadedFont) => {
                    document.fonts.add(loadedFont);
                    updateElement(id, 'customFont', fontName);
                    updateElement(id, 'fontFamily', fontName);
                    renderComponentLists();
                    showToast('Font uploaded');
                }).catch((err) => {
                    showToast('Failed to load font', 'error');
                    console.error(err);
                });
            };
            reader.readAsDataURL(file);
        }

        // ==========================================
        // Asset Library
        // ==========================================

        // Smart background removal - samples corners and removes similar colors
        function removeBlackBackground(dataUrl) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    const w = canvas.width;
                    const h = canvas.height;

                    // Sample corners to find background color
                    const corners = [
                        0,                           // top-left
                        (w - 1) * 4,                 // top-right
                        (h - 1) * w * 4,             // bottom-left
                        ((h - 1) * w + (w - 1)) * 4  // bottom-right
                    ];

                    // Get average color of corners
                    let bgR = 0, bgG = 0, bgB = 0;
                    corners.forEach(i => {
                        bgR += data[i];
                        bgG += data[i + 1];
                        bgB += data[i + 2];
                    });
                    bgR = Math.round(bgR / 4);
                    bgG = Math.round(bgG / 4);
                    bgB = Math.round(bgB / 4);

                    // Color distance function
                    function colorDistance(r, g, b) {
                        return Math.sqrt(
                            Math.pow(r - bgR, 2) +
                            Math.pow(g - bgG, 2) +
                            Math.pow(b - bgB, 2)
                        );
                    }

                    // Tolerance for background removal
                    const tolerance = 60;

                    // Check if dark color
                    function isDark(r, g, b) {
                        return (r + g + b) / 3 < 80;
                    }

                    // Process each pixel
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];

                        const dist = colorDistance(r, g, b);

                        // Remove if similar to background OR very dark
                        if (dist < tolerance || (isDark(r, g, b) && dist < tolerance * 1.5)) {
                            if (dist < tolerance * 0.5) {
                                data[i + 3] = 0;
                            } else {
                                const alpha = Math.min(255, (dist / tolerance) * 255);
                                data[i + 3] = Math.round(alpha);
                            }
                        }
                    }

                    ctx.putImageData(imageData, 0, 0);
                    resolve(canvas.toDataURL('image/png'));
                };
                img.onerror = () => resolve(dataUrl);
                img.src = dataUrl;
            });
        }

        function uploadAsset(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                // Process image to remove black background
                const processedData = await removeBlackBackground(e.target.result);
                state.assets.push({
                    id: generateId(),
                    name: file.name,
                    data: processedData
                });
                renderAssetLibrary();
                showToast('Asset uploaded (black background removed)');
            };
            reader.readAsDataURL(file);
        }

        function renderAssetLibrary() {
            const grid = document.getElementById('assetGrid');
            grid.innerHTML = '';

            state.assets.forEach(asset => {
                const item = document.createElement('div');
                item.className = 'asset-item';
                item.title = asset.name;
                item.innerHTML = `<img src="${asset.data}" alt="${asset.name}">`;
                item.onclick = () => {
                    // Copy to clipboard or use in selected element
                    if (state.selectedElementId) {
                        const screen = getCurrentScreen();
                        const element = screen?.elements.find(e => e.id === state.selectedElementId);
                        if (element && (element.type === 'button' || element.type === 'ui')) {
                            updateElement(state.selectedElementId, 'image', asset.data);
                            renderComponentLists();
                            showToast('Asset applied to element');
                        }
                    }
                };
                grid.appendChild(item);
            });
        }

        // ==========================================
        // Preview Rendering
        // ==========================================
        function renderPreview() {
            const phoneScreen = document.getElementById('phoneScreen');
            const screen = getCurrentScreen();

            if (!screen) {
                phoneScreen.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;">No screen selected</div>';
                return;
            }

            phoneScreen.style.backgroundColor = screen.backgroundColor || state.colors.find(c => c.id === 'bg')?.value || '#1a1a2e';
            phoneScreen.innerHTML = '';

            screen.elements.forEach(element => {
                const el = createPreviewElement(element);
                phoneScreen.appendChild(el);
            });
        }

        function createPreviewElement(element) {
            const el = document.createElement('div');
            el.className = `preview-element ${element.id === state.selectedElementId ? 'selected' : ''}`;
            el.dataset.id = element.id;
            el.style.left = element.x + 'px';
            el.style.top = element.y + 'px';
            el.style.width = element.width + 'px';
            el.style.height = element.height + 'px';

            // Shape-based styling
            const shapeStyles = {
                circle: '50%',
                square: '8px',
                rectangle: '8px',
                oval: '50%'
            };

            if (element.type === 'button' || element.type === 'ui') {
                el.classList.add(element.type === 'button' ? 'preview-button' : 'preview-ui-element');
                el.style.borderRadius = shapeStyles[element.shape] || '8px';

                if (element.image) {
                    // Handle transparent black
                    el.style.backgroundImage = `url(${element.image})`;
                    el.style.backgroundSize = 'contain';
                    el.style.backgroundPosition = 'center';
                    el.style.backgroundRepeat = 'no-repeat';
                    el.style.backgroundColor = 'transparent';
                } else {
                    el.style.backgroundColor = element.color;
                }

                if (element.type === 'button' && element.text) {
                    el.textContent = element.text;
                    el.style.color = element.textColor || '#ffffff';
                }
            }

            if (element.type === 'text') {
                el.classList.add('preview-text');
                el.textContent = element.content;
                el.style.fontSize = element.fontSize + 'px';
                el.style.color = element.color;
                el.style.fontFamily = element.fontFamily || 'sans-serif';
            }

            if (element.type === 'counter') {
                el.classList.add('preview-counter');
                el.style.backgroundColor = element.color;
                el.style.borderRadius = '8px';
                el.style.fontSize = element.fontSize + 'px';
                el.style.color = element.textColor;
                const displayValue = element.displayFormat.replace('{value}', element.initialValue);
                el.textContent = displayValue;
            }

            if (element.type === 'gameboard') {
                el.classList.add('preview-gameboard');
                el.style.gridTemplateColumns = `repeat(${element.columns}, ${element.cellSize}px)`;
                el.style.gridTemplateRows = `repeat(${element.rows}, ${element.cellSize}px)`;
                el.style.backgroundColor = element.backgroundColor;

                for (let i = 0; i < element.rows * element.columns; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'gameboard-cell';
                    cell.style.width = element.cellSize + 'px';
                    cell.style.height = element.cellSize + 'px';
                    el.appendChild(cell);
                }
            }

            // Add resize handles
            ['nw', 'ne', 'sw', 'se'].forEach(pos => {
                const handle = document.createElement('div');
                handle.className = `resize-handle ${pos}`;
                handle.dataset.handle = pos;
                el.appendChild(handle);
            });

            // Add interaction handlers
            el.addEventListener('mousedown', (e) => handleElementMouseDown(e, element));
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                selectElement(element.id);
            });

            return el;
        }

        // ==========================================
        // Drag and Resize
        // ==========================================
        let dragState = {
            active: false,
            type: null, // 'move' or 'resize'
            elementId: null,
            startX: 0,
            startY: 0,
            startElX: 0,
            startElY: 0,
            startWidth: 0,
            startHeight: 0,
            handle: null
        };

        function handleElementMouseDown(e, element) {
            e.stopPropagation();

            const handle = e.target.dataset.handle;
            dragState.active = true;
            dragState.elementId = element.id;
            dragState.startX = e.clientX;
            dragState.startY = e.clientY;
            dragState.startElX = element.x;
            dragState.startElY = element.y;
            dragState.startWidth = element.width;
            dragState.startHeight = element.height;

            if (handle) {
                dragState.type = 'resize';
                dragState.handle = handle;
            } else {
                dragState.type = 'move';
            }

            selectElement(element.id);
        }

        document.addEventListener('mousemove', (e) => {
            if (!dragState.active) return;

            const screen = getCurrentScreen();
            const element = screen?.elements.find(el => el.id === dragState.elementId);
            if (!element) return;

            const dx = e.clientX - dragState.startX;
            const dy = e.clientY - dragState.startY;

            if (dragState.type === 'move') {
                element.x = Math.max(0, Math.min(390 - element.width, dragState.startElX + dx));
                element.y = Math.max(0, Math.min(600 - element.height, dragState.startElY + dy));
            } else if (dragState.type === 'resize') {
                const handle = dragState.handle;

                if (handle.includes('e')) {
                    element.width = Math.max(20, dragState.startWidth + dx);
                }
                if (handle.includes('w')) {
                    const newWidth = Math.max(20, dragState.startWidth - dx);
                    element.x = dragState.startElX + (dragState.startWidth - newWidth);
                    element.width = newWidth;
                }
                if (handle.includes('s')) {
                    element.height = Math.max(20, dragState.startHeight + dy);
                }
                if (handle.includes('n')) {
                    const newHeight = Math.max(20, dragState.startHeight - dy);
                    element.y = dragState.startElY + (dragState.startHeight - newHeight);
                    element.height = newHeight;
                }
            }

            renderPreview();
            renderProperties();
        });

        document.addEventListener('mouseup', () => {
            if (dragState.active) {
                dragState.active = false;
                renderComponentLists();
            }
        });

        // Click on empty area deselects
        document.getElementById('phoneScreen').addEventListener('click', (e) => {
            if (e.target.id === 'phoneScreen') {
                state.selectedElementId = null;
                renderPreview();
                renderProperties();
                renderComponentLists();
            }
        });

            if (element.type === 'text') {

                                onchange="updateElement('${element.id}', 'fontSize', parseInt(this.value))">
                        </div>
                        <div class="property-row">
                            <span class="property-label">Color</span>
                            <input type="color" class="property-input" value="${element.color}" style="padding:2px;"
                                onchange="updateElement('${element.id}', 'color', this.value)">
                        </div>
                    </div>
                `;
            }

            if (element.type === 'counter') {
                html += `
                    <div class="property-group">
                        <div class="property-group-title">Counter</div>
                        <div class="property-row">
                            <span class="property-label">Initial</span>
                            <input type="number" class="property-input" value="${element.initialValue}"
                                onchange="updateElement('${element.id}', 'initialValue', parseInt(this.value))">
                        </div>
                        <div class="property-row">
                            <span class="property-label">Format</span>
                            <input type="text" class="property-input" value="${element.displayFormat}"
                                onchange="updateElement('${element.id}', 'displayFormat', this.value)">
                        </div>
                        <div class="property-row">
                            <span class="property-label">BG</span>
                            <input type="color" class="property-input" value="${element.color}" style="padding:2px;"
                                onchange="updateElement('${element.id}', 'color', this.value)">
                        </div>
                        <div class="property-row">
                            <span class="property-label">Text</span>
                            <input type="color" class="property-input" value="${element.textColor}" style="padding:2px;"
                                onchange="updateElement('${element.id}', 'textColor', this.value)">
                        </div>
                    </div>
                    <div class="property-group">
                        <div class="property-group-title">Behavior</div>
                        <textarea class="trigger-input" style="width:100%" placeholder="Describe counter behavior"
                            onchange="updateElement('${element.id}', 'behavior', this.value)">${element.behavior || ''}</textarea>
                    </div>
                `;
            }

            if (element.type === 'gameboard') {
                html += `
                    <div class="property-group">
                        <div class="property-group-title">Grid</div>
                        <div class="property-row">
                            <span class="property-label">Rows</span>
                            <input type="number" class="property-input" min="3" max="12" value="${element.rows}"
                                onchange="updateElement('${element.id}', 'rows', parseInt(this.value))">
                        </div>
                        <div class="property-row">
                            <span class="property-label">Cols</span>
                            <input type="number" class="property-input" min="3" max="12" value="${element.columns}"
                                onchange="updateElement('${element.id}', 'columns', parseInt(this.value))">
                        </div>
                        <div class="property-row">
                            <span class="property-label">Cell</span>
                            <input type="number" class="property-input" min="20" max="60" value="${element.cellSize}"
                                onchange="updateElement('${element.id}', 'cellSize', parseInt(this.value))">
                        </div>
                    </div>
                    <div class="property-group">
                        <div class="property-group-title">Mechanics</div>
                        <textarea class="trigger-input" style="width:100%" placeholder="Describe gameplay mechanics"
                            onchange="updateElement('${element.id}', 'mechanics', this.value)">${element.mechanics || ''}</textarea>
                    </div>
                `;
            }

            // ID display
            html += `
                <div class="property-group">
                    <div class="property-group-title">Identifier</div>
                    <div style="font-family:monospace;font-size:11px;color:var(--text-muted);background:var(--bg-primary);padding:8px;border-radius:4px;">
                        ${element.id}
                    </div>
                </div>
            `;

            content.innerHTML = html;
        }

        // ==========================================
        // Save & Export
        // ==========================================
        function saveProject() {
            const data = JSON.stringify(state, null, 2);
            localStorage.setItem('jestGameProject', data);
            showToast('Project saved to local storage');
        }

        function loadProject() {
            const data = localStorage.getItem('jestGameProject');
            if (data) {
                try {
                    state = JSON.parse(data);
                    document.getElementById('projectName').textContent = state.projectName;
                    renderScreenTabs();
                    renderColors();
                    renderAssetLibrary();
                    if (state.screens.length > 0 && !state.currentScreenId) {
                        switchToScreen(state.screens[0].id);
                    } else if (state.currentScreenId) {
                        switchToScreen(state.currentScreenId);
                    }
                    showToast('Project loaded');
                } catch (e) {
                    console.error('Failed to load project:', e);
                }
            }
        }

        function exportProject() {
            const exportData = {
                projectName: state.projectName,
                exportedAt: new Date().toISOString(),
                colors: state.colors,
                screens: state.screens.map(screen => ({
                    id: screen.id,
                    name: screen.name,
                    backgroundColor: screen.backgroundColor,
                    elements: screen.elements.map(el => {
                        const base = {
                            id: el.id,
                            type: el.type,
                            name: el.name,
                            position: { x: el.x, y: el.y },
                            size: { width: el.width, height: el.height }
                        };

                        // Add type-specific properties
                        if (el.type === 'button') {
                            return {
                                ...base,
                                shape: el.shape,
                                color: el.color,
                                text: el.text,
                                textColor: el.textColor,
                                triggerBehavior: el.triggerBehavior,
                                hasImage: !!el.image
                            };
                        }
                        if (el.type === 'ui') {
                            return {
                                ...base,
                                shape: el.shape,
                                color: el.color,
                                hasImage: !!el.image
                            };
                        }
                        if (el.type === 'text') {
                            return {
                                ...base,
                                content: el.content,
                                fontSize: el.fontSize,
                                fontFamily: el.fontFamily,
                                color: el.color,
                                hasCustomFont: !!el.customFont
                            };
                        }
                        if (el.type === 'counter') {
                            return {
                                ...base,
                                initialValue: el.initialValue,
                                displayFormat: el.displayFormat,
                                behavior: el.behavior,
                                fontSize: el.fontSize,
                                color: el.color,
                                textColor: el.textColor
                            };
                        }
                        if (el.type === 'gameboard') {
                            return {
                                ...base,
                                rows: el.rows,
                                columns: el.columns,
                                cellSize: el.cellSize,
                                mechanics: el.mechanics,
                                backgroundColor: el.backgroundColor
                            };
                        }
                        return base;
                    })
                })),
                assets: state.assets.map(a => ({ id: a.id, name: a.name }))
            };

            document.getElementById('exportPreview').textContent = JSON.stringify(exportData, null, 2);
            document.getElementById('exportModal').classList.add('visible');
        }

        function closeExportModal() {
            document.getElementById('exportModal').classList.remove('visible');
        }

        function downloadJSON() {
            const exportData = {
                projectName: state.projectName,
                exportedAt: new Date().toISOString(),
                colors: state.colors,
                screens: state.screens,
                assets: state.assets
            };

            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${state.projectName.replace(/\s+/g, '_').toLowerCase()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            closeExportModal();
            showToast('JSON downloaded');
        }

        // ==========================================
        // Initialization
        // ==========================================
        function init() {
            // Try to load saved project
            const saved = localStorage.getItem('jestGameProject');
            if (saved) {
                try {
                    state = JSON.parse(saved);
                    document.getElementById('projectName').textContent = state.projectName;
                } catch (e) {
                    console.error('Failed to parse saved state');
                }
            }

            // Initialize with at least one screen if none exist
            if (state.screens.length === 0) {
                addScreen();
            } else {
                state.currentScreenId = state.screens[0].id;
            }

            renderScreenTabs();
            renderColors();
            renderAssetLibrary();
            renderPreview();
            renderProperties();
            renderComponentLists();

            console.log('[JestGameEngine] Initialized successfully');
        }

        // Start the app
        init();
    </script>
</body>
</html>
